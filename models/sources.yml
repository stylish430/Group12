version: 2

sources:
  - name: google_drive_schema
    database: LOAD
    schema: GOOGLE_DRIVE_SCHEMA
    tables:
      - name: EXPENSES
        config:
          freshness:
            warn_after: {count: 48, period: hour}
            error_after: {count: 72, period: hour}

      - name: HR_JOINS
      - name: HR_QUITS
      - name: HR_RETURNS

  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    tables:
      - name: ITEM_VIEWS
      - name: ORDERS
      - name: PAGE_VIEWS
      - name: SESSIONS