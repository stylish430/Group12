version: 2

models:

  # =========================
  # DIM_EMPLOYEE
  # =========================
  - name: dim_employee
    description: "Dimension table containing one row per employee, including both active and former employees."

    columns:
      - name: employee_id
        description: "Unique identifier for each employee."
        tests:
          - unique
          - not_null

      - name: employee_name
        description: "Full name of the employee."

      - name: job_title
        description: "Current or last known job title of the employee."

      - name: annual_salary
        description: "Annual salary of the employee in USD."

      - name: hire_date
        description: "Date when the employee was hired."

      - name: quit_date
        description: "Date when the employee left the company (NULL if still active)."

      - name: is_active
        description: "Boolean flag indicating whether the employee is currently active."

  # =========================
  # DIM_CLIENT
  # =========================
  - name: dim_client
    description: "Dimension table with one row per client, including session activity, order metrics, and latest shipping address."

    columns:
      - name: client_id
        description: "Unique identifier for the client."
        tests:
          - unique
          - not_null

      - name: first_seen_at
        description: "Timestamp of the first session recorded for the client."

      - name: total_sessions
        description: "Total number of sessions associated with the client."

      - name: total_orders
        description: "Total number of non-refunded orders placed by the client."

      - name: lifetime_value
        description: "Total shipping revenue generated by the client from non-refunded orders."

      - name: latest_shipping_address
        description: "Most recent shipping address used by the client based on latest order."

      - name: client_category
        description: "Client classification: 'Purchaser' if at least one order exists, otherwise 'Visitor'."

  # =========================
  # DIM_ITEM
  # =========================
  - name: dim_item
    description: "Dimension table containing one row per item. Stores all observed prices as an array due to size variations."

    columns:
      - name: item_name
        description: "Name of the item (primary key)."
        tests:
          - unique
          - not_null

      - name: price_list
        description: "Array of distinct prices observed for the item, reflecting different sizes or variations."

  # =========================
  # FACT_SESSION
  # =========================
  - name: fact_session
    description: "Fact table with one row per session. Used for funnel analysis and session-level behavioral metrics."

    columns:
      - name: session_id
        description: "Unique identifier for the session."
        tests:
          - unique
          - not_null

      - name: client_id
        description: "Identifier of the client associated with the session."

      - name: session_at
        description: "Timestamp when the session started."

      - name: operating_system
        description: "Operating system used during the session (e.g., iOS, Android, Web)."

      - name: total_page_views
        description: "Total number of page views recorded in the session."

      - name: has_viewed_shopping_page
        description: "Boolean flag indicating whether the shopping page was viewed during the session."

      - name: total_item_views
        description: "Total number of item view events during the session."

      - name: total_added_to_cart
        description: "Total quantity of items added to cart during the session."

      - name: total_removed_from_cart
        description: "Total quantity of items removed from cart during the session."

      - name: has_viewed_item
        description: "Boolean flag indicating whether at least one item was viewed."

      - name: has_added_to_cart
        description: "Boolean flag indicating whether at least one item was added to the cart."

      - name: has_placed_order
        description: "Boolean flag indicating whether an order was placed in the session."

  # =========================
  # FACT_ORDER
  # =========================
  - name: fact_order
    description: "Fact table containing one row per order, summarizing transaction details."

    columns:
      - name: order_id
        description: "Unique identifier for the order after deduplication."
        tests:
          - unique
          - not_null

      - name: session_id
        description: "Identifier of the session during which the order was placed."

      - name: client_id
        description: "Identifier of the client who placed the order."

      - name: client_name
        description: "Name of the client associated with the order."

      - name: client_phone
        description: "Phone number of the client."

      - name: shipping_state
        description: "State to which the order was shipped."

      - name: shipping_address
        description: "Full shipping address for the order."

      - name: payment_method
        description: "Payment method used for the order."

      - name: shipping_cost_usd
        description: "Shipping cost associated with the order in USD."

      - name: tax_rate
        description: "Tax rate applied to the order."

      - name: order_at
        description: "Timestamp when the order was placed."

      - name: is_refunded
        description: "Boolean flag indicating whether the order was refunded."

      - name: returned_at
        description: "Date when the order was returned, if applicable."

  # =========================
  # DAILY_FINANCES
  # =========================
  - name: daily_finances
    description: "Daily aggregated financial metrics including revenue, cost, and net profit."

    columns:
      - name: log_date
        description: "Date of the financial record."
        tests:
          - not_null

      - name: total_revenue
        description: "Total revenue for the day (estimated GMV + shipping revenue)."
        tests:
          - not_null

      - name: total_cost
        description: "Total expenses recorded for the day."
        tests:
          - not_null

      - name: net_profit
        description: "Net profit calculated as total revenue minus total cost."
        tests:
          - not_null