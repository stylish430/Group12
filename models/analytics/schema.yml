version: 2

models:
  - name: dim_employee
    description: "Dimension table for employees. Summarizes hiring, quitting, and active status for HR analysis."
    columns:
      - name: employee_id
        description: "Unique identifier for the employee."
        tests:
          - unique
          - not_null
      - name: employee_name
        description: "Full name of the employee."
      - name: job_title
        description: "Job title or role of the employee."
      - name: annual_salary
        description: "Annual salary of the employee (in USD)."
      - name: hire_date
        description: "Date when the employee was hired."
      - name: quit_date
        description: "Date when the employee left the company (NULL if still active)."
      - name: is_active
        description: "Boolean flag: TRUE if the employee is currently active (no quit date)."

  - name: dim_client
    description: "Dimension table for clients. Includes first visit timestamp, total sessions, and Lifetime Value (LTV)."
    columns:
      - name: client_id
        description: "Unique identifier for the client (derived from session client ID)."
        tests:
          - unique
          - not_null
      - name: first_seen_at
        description: "Timestamp of the client's first recorded session."
      - name: total_sessions
        description: "Total number of sessions initiated by this client."
      - name: total_orders
        description: "Total number of non-refunded orders placed by this client."
      - name: lifetime_value
        description: "Total revenue (shipping cost) generated by this client from non-refunded orders."
      - name: client_category
        description: "Segment based on purchase behavior: 'Purchaser' (has at least one order) or 'Visitor' (no orders)."

  - name: dim_item
    description: "Dimension table for items sold. Aggregates average price per item."
    columns:
      - name: item_name
        description: "Primary key. Name of the product."
        tests:
          - unique
          - not_null
      - name: avg_price_usd
        description: "Average price per unit of the item (in USD), computed across all views."

  - name: fact_session
    description: "Fact table for website sessions. Central table for Funnel Analysis containing conversion flags."
    columns:
      - name: session_id
        description: "Unique identifier for the session."
        tests:
          - unique
          - not_null
      - name: has_viewed_shopping_page
        description: "Boolean flag: 1 if the session visited the shopping page."
      - name: has_viewed_item
        description: "Boolean flag: 1 if the session viewed at least one item."
      - name: has_added_to_cart
        description: "Boolean flag: 1 if the session added at least one item to cart."
      - name: has_placed_order
        description: "Boolean flag: 1 if the session successfully placed an order."

  - name: fact_order
    description: "Fact table for orders. Contains transaction details including shipping, tax, and refund status."
    columns:
      - name: order_id
        description: "Unique identifier for the order (after deduplication)."
        tests:
          - unique
          - not_null
      - name: session_id
        description: "Foreign key to the session that originated the order."
      - name: client_name
        description: "Name of the client who placed the order."
      - name: client_phone
        description: "Phone number of the client."
      - name: shipping_state
        description: "State to which the order was shipped."
      - name: payment_method
        description: "Method of payment used (e.g., credit card, PayPal)."
      - name: shipping_cost
        description: "Shipping cost in USD (numeric)."
      - name: tax_rate
        description: "Applicable tax rate for the order."
      - name: order_at
        description: "Timestamp when the order was placed."
      - name: is_refunded
        description: "Boolean flag: TRUE if the order was refunded."

  - name: daily_finances
    description: "Daily aggregation of financial metrics. Used for revenue, cost, and profit trend analysis."
    columns:
      - name: log_date
        description: "The date of the financial record."
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue for the day (estimated GMV from item views + shipping revenue from non-refunded orders)."
      - name: total_cost
        description: "Total expenses recorded for the day (from expense tracking)."
      - name: net_profit
        description: "Total revenue minus total cost for the day."