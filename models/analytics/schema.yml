version: 2

models:
  - name: dim_employee
    description: "Dimension table for employees. Summarizes hiring, quitting, and active status for HR analysis."
    columns:
      - name: employee_id
        description: "Unique identifier for the employee."
        tests:
          - unique
          - not_null

  - name: dim_client
    description: "Dimension table for clients. Includes first visit timestamp, total sessions, and Lifetime Value (LTV)."
    columns:
      - name: client_id
        description: "Unique identifier for the client (based on phone or session ID)."
        tests:
          - unique
          - not_null

  - name: dim_item
    description: "Dimension table for items sold. Aggregates total views, cart additions, and average price."
    columns:
      - name: item_name
        description: "Primary key. Name of the product."
        tests:
          - unique
          - not_null

  - name: fact_session
    description: "Fact table for website sessions. Central table for Funnel Analysis containing conversion flags."
    columns:
      - name: session_id
        description: "Unique identifier for the session."
        tests:
          - unique
          - not_null
      - name: has_viewed_item
        description: "Boolean flag: 1 if the client viewed at least one item."
      - name: has_placed_order
        description: "Boolean flag: 1 if the client completed an order."

  - name: fact_order
    description: "Fact table for orders. Contains transaction details including revenue, tax, and payment methods."
    columns:
      - name: order_id
        description: "Unique identifier for the order."
        tests:
          - unique
          - not_null
      - name: revenue
        description: "The amount of revenue generated by the order."

  - name: daily_finances
    description: "Daily aggregation of financial metrics. Used for revenue, cost, and profit trend analysis."
    columns:
      - name: log_date
        description: "The date of the financial record."
        tests:
          - unique
          - not_null